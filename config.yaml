llm:
  provider: deepseek
  api_key: ''
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  timeout: 120
  temperature: 0.0
agents:
  rule_strict: true
  parallel_workers: 5
  enabled:
  - clinical_pharmacist
  - internal_medicine
  - allergy_specialist
  - pharmacy_inventory
  - specialist
data:
  raw_dir: datasets/mimic-iii-clinical-database-1.4
  processed_dir: datasets/processed
  knowledge_dir: datasets/knowledge
  cases_dir: datasets/cases
  case_templates_dir: datasets/case_templates
  knowledge_base: datasets/knowledge/hospital_production_v5.json
  formulary: datasets/knowledge/pharmacy_formulary.json
  mimic:
    max_samples: 0
    require_medications: true
    include_labs: true
    include_icu: true
    include_imaging: true
    skip_notes: false
server:
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: false
  timeout_keep_alive: 30
  cors_origins:
  - '*'
logging:
  level: INFO
  format: console
  log_dir: logs
  log_file: medsafe.log
  max_bytes: 10485760
  backup_count: 5
paths:
  logs_dir: logs
  models_dir: models
  datasets_dir: datasets
  reports_dir: datasets/reports
vision_llm:
  provider: qwen
  api_key: ''
  # 百炼 Model Studio：https://bailian.console.aliyun.com/cn-beijing
  region: cn-beijing
  workspace_id: ''
  base_url: ''
  model: qwen3-vl-plus
  timeout: 120
deepseek_llm:
  api_key: ''
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  timeout: 120
chat:
  provider: deepseek
  api_key: ''
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  timeout: 120
  max_retries: 2
  fallback_enabled: true
  knowledge_graph: datasets/knowledge/drug_kg_v2.json
embedding:
  provider: lmstudio
  api_key: lm-studio
  base_url: http://localhost:1234/v1
  # 短名即可；LM Studio 会自动解析为 text-embedding-nomic-embed-text-v1.5@...
  model: nomic-embed-text
  timeout: 60
  query_prefix: ''
  passage_prefix: ''
  model_dir: models/drug_search
  model_id: intfloat/multilingual-e5-small
  batch_size: 32
debate:
  enabled: true
  max_rounds: 3
  confidence_threshold: 0.75
  flag_for_human_on_no_consensus: true
drug_catalog:
  db_path: data/hospital/formulary.db
  formulary_path: datasets/hospital/formulary_demo.csv
  auto_import_on_startup: true
  semantic_search:
    enabled: true
    min_score: 0.25
pharmacy:
  enabled: true
  db_path: data/pharmacy/pharmacy_reviews.db
  auto_enqueue_cpoe: true
  queue_page_size: 25
  require_override_reason: true
  audit_retention_days: 365
auth:
  db_path: data/auth/medsafe_auth.db
  jwt_secret: ''
  token_ttl_hours: 72
clinical_knowledge:
  version: hospital_production_v5
  ddi_source: ddi_bert_mined
  mined_rules_path: datasets/knowledge/mined_ddi_rules.json
  expanded_rules_path: datasets/knowledge/expanded_drug_safety_rules.json
  production_rules_path: datasets/knowledge/hospital_production_v5.json
  drug_kg_v2_path: datasets/knowledge/drug_kg_v2_stage11.json
  twosides_signals_path: datasets/knowledge/twosides_ddi_signals.json
  mining_exclusions: datasets/knowledge/ddi_mining_exclusions.json
  mining_thresholds:
    high: 0.7
    medium: 0.65
safety_models:
  enabled: true
  med7:
    enabled: true
    wheel_path: models/med7/en_core_med7_lg-1.1.0-py3-none-any.whl
  ddi_bert:
    enabled: true
    model_dir: models/ddi_bert
    smiles_path: datasets/knowledge/drug_smiles.json
    high_threshold: 0.75
    medium_threshold: 0.55
  pubchem:
    enabled: true
    cache_path: data/smiles_cache.db
    inn_map_path: datasets/knowledge/drug_inn_map.json
    timeout: 10
    rate_limit_seconds: 0.25
imaging:
  serial_only: true
  max_models_parallel: 1
  device: cpu
  totalseg_home: models/totalsegmentator
  default_lesion_models:
    mimic_cxr: cxr_lesion
    brats2024: brats_tumor
  remote:
    enabled: false
    base_url: ''
    api_token: ''
    timeout_seconds: 600
    fallback_to_local: true
    health_cache_seconds: 30
    worker:
      host: 127.0.0.1
      port: 9000
fhir:
  enabled: true
  base_path: /api/v1/fhir
  resource_version: R4
  default_profile: MedSafeDetectedIssue
  coding_systems:
    rxnorm: http://www.nlm.nih.gov/research/umls/rxnorm
    loinc: http://loinc.org
    snomed: http://snomed.info/sct
    icd10: http://hl7.org/fhir/sid/icd-10-cm
