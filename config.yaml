# =============================================================================
# MedSafe Configuration — Multi-Agent LLM API Architecture
# =============================================================================

# ── LLM API ────────────────────────────────────────────────────────────
llm:
  provider: "mock"                   # mock | openai | deepseek | qwen
  api_key: ""                        # or set MEDSAFE_LLM_API_KEY env var
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
  timeout: 60
  temperature: 0.0

# ── Multi-Agent ─────────────────────────────────────────────────────────
agents:
  rule_strict: true                  # high-risk rules cannot be overridden by LLM
  parallel_workers: 5
  enabled:
    - clinical_pharmacist
    - internal_medicine
    - allergy_specialist
    - pharmacy_inventory
    - specialist

# ── Data ────────────────────────────────────────────────────────────────
data:
  raw_dir: "data/raw/mimiciii"
  processed_dir: "data/processed"
  knowledge_dir: "data/knowledge"
  cases_dir: "data/cases"
  demo_dir: "data/demo_cases"
  knowledge_base: "data/knowledge/minimal_drug_safety_rules.json"
  formulary: "data/knowledge/pharmacy_formulary.json"

# ── API Server ──────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false
  timeout_keep_alive: 30
  cors_origins:
    - "*"

# ── Logging ─────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "console"
  log_dir: "logs"
  log_file: "medsafe.log"
  max_bytes: 10485760
  backup_count: 5

# ── Paths ───────────────────────────────────────────────────────────────
paths:
  logs_dir: "logs"
  models_dir: "models"
  reports_dir: "data/reports"

# ── Vision LLM (Qwen3-VL cloud) ─────────────────────────────────────────
vision_llm:
  provider: "mock"                   # mock | qwen
  api_key: ""                        # or MEDSAFE_VISION_LLM__API_KEY
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen-vl-max-latest"        # Qwen3-VL 系列
  timeout: 120

# ── DeepSeek multi-agent synthesis ──────────────────────────────────────
deepseek_llm:
  api_key: ""                        # or MEDSAFE_DEEPSEEK__API_KEY
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"             # DeepSeek V3/R1 — 配置 v4 pro 时替换
  timeout: 120

# ── ReAct Chat (元安 Agent 整合) ─────────────────────────────────────────
chat:
  provider: "mock"
  api_key: ""
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  timeout: 120
  max_retries: 2
  fallback_enabled: true
  knowledge_graph: "data/knowledge/drug_kg.json"

# ── Multi-round debate (ClinicalPilot + MDAgents) ───────────────────────
debate:
  enabled: true
  max_rounds: 3
  confidence_threshold: 0.75
  flag_for_human_on_no_consensus: true

# ── Imaging segmentation ──────────────────────────────────────────────────
imaging:
  serial_only: true
  max_models_parallel: 1
  device: "cpu"                      # 16GB Mac — CPU/MPS 串行
  totalseg_home: "models/totalsegmentator"
