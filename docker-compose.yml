# =============================================================================
# MedSafe Docker Compose — API + Vue Frontend
# =============================================================================
# Start:  docker compose up -d --build
# UI:      http://localhost:3000
# API:     http://localhost:8000/docs

services:
  api:
    build: .
    image: medsafe-api:2.0.0
    container_name: medsafe-api
    ports:
      - "${MEDSAFE_API_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - MEDSAFE_LLM__PROVIDER=${MEDSAFE_LLM_PROVIDER:-deepseek}
      - MEDSAFE_LLM__API_KEY=${MEDSAFE_LLM_API_KEY:-}
      - MEDSAFE_LOGGING__FORMAT=structured
    volumes:
      - ./datasets/cases:/app/datasets/cases
      - ./datasets/knowledge:/app/datasets/knowledge
      - ./datasets/case_templates:/app/datasets/case_templates
      - ./datasets/hospital:/app/datasets/hospital
      - ./datasets/departments:/app/datasets/departments
      - ./datasets/agents:/app/datasets/agents
      - ./datasets/mimic_cxr:/app/datasets/mimic_cxr
      - ./datasets/chest_ct:/app/datasets/chest_ct
      - ./datasets/kits19:/app/datasets/kits19
      - ./datasets/brats2024:/app/datasets/brats2024
      - ./data/pharmacy:/app/data/pharmacy
      - ./data/auth:/app/data/auth
      - ./data/hospital:/app/data/hospital
      - ./data/imaging_cache:/app/data/imaging_cache
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build: ./frontend
    image: medsafe-web:2.0.0
    container_name: medsafe-web
    ports:
      - "${MEDSAFE_WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
