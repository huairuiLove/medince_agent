agents:
  clinical_pharmacist:
    module: src.agents.clinical_pharmacist
    class: ClinicalPharmacistAgent
    agent_id: clinical_pharmacist
    agent_name: 临床药师
    role: 药物相互作用、剂量、重复用药审查
    debate: true
    default_enabled: true
    default_skills:
    - base
    - ddi_review
    - dose_review
    skills:
    - id: base
      title: 基础角色
      file: base.md
    - id: ddi_review
      title: 药物相互作用审查
      file: ddi_review.md
    - id: dose_review
      title: 剂量与给药途径
      file: dose_review.md
