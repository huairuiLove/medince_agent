      file: base.md
    - id: formulary_check
      title: Formulary 审查
      file: formulary_check.md
    - id: stock_alternative
      title: 缺货替代
      file: stock_alternative.md
  specialist:
    module: src.agents.specialist_router
    class: SpecialistAgent
    agent_id: specialist
    agent_name: 专科医生
    role: 专科禁忌（妊娠/抗凝/老年/感染等）
    debate: true
    default_enabled: false
    default_skills:
    - base
    - pregnancy
    - anticoagulation
    activate_when:
      drug_keywords:
      - warfarin
      - heparin
      - enoxaparin
      - lisinopril
      - losartan
      female_reproductive_age: true
      age_gte: 65
    skills:
    - id: base
      title: 基础角色
      file: base.md
    - id: pregnancy
      title: 妊娠用药
      file: pregnancy.md
    - id: anticoagulation
      title: 抗凝桥接
      file: anticoagulation.md
    - id: geriatric
      title: 老年用药
      file: geriatric.md
