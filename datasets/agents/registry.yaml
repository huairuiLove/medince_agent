      title: 基础角色
      file: base.md
    - id: cross_allergy
      title: 交叉过敏
      file: cross_allergy.md
    - id: adr_history
      title: 既往 ADR
      file: adr_history.md
  pharmacy_inventory:
    module: src.agents.pharmacy_inventory
    class: PharmacyInventoryAgent
    agent_id: pharmacy_inventory
    agent_name: 药房库管
    role: 库存、formulary、替代方案
    debate: true
    default_enabled: true
    default_skills:
    - base
    - formulary_check
